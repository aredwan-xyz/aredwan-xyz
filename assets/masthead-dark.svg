<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 250" width="1200" height="250" role="img" aria-label="The Redwan Review">
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ea043"/>
      <stop offset="55%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#7ee787"/>
    </linearGradient>
  </defs>

  <!-- kicker -->
  <text x="600" y="40" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="11" letter-spacing="3" fill="#7ee787" opacity="0.9">
    AI ENGINEERING &#160;·&#160; EXPERIENCE DESIGN &#160;·&#160; AMBIENT COMPUTING
  </text>

  <!-- top double rule -->
  <line x1="60" y1="62" x2="1140" y2="62" stroke="#2ea043" stroke-width="3"/>
  <line x1="60" y1="70" x2="1140" y2="70" stroke="#2ea043" stroke-width="1"/>

  <!-- nameplate -->
  <text x="600" y="158" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="48" letter-spacing="6" fill="url(#ink)">
    THE REDWAN REVIEW
  </text>

  <!-- folio rules + line -->
  <line x1="60" y1="190" x2="1140" y2="190" stroke="#2ea043" stroke-width="1"/>
  <text x="60"   y="216" text-anchor="start"  font-family="Helvetica, Arial, sans-serif"
        font-size="12" letter-spacing="2" fill="#7ee787">VOL. I &#160;·&#160; MMXXVI</text>
  <text x="600"  y="216" text-anchor="middle" font-family="Georgia, serif"
        font-size="13" fill="#3fb950">✦</text>
  <text x="1140" y="216" text-anchor="end"    font-family="Helvetica, Arial, sans-serif"
        font-size="12" letter-spacing="2" fill="#7ee787">TORONTO &#160;·&#160; REMOTE WORLDWIDE</text>
  <line x1="60" y1="230" x2="1140" y2="230" stroke="#2ea043" stroke-width="1"/>
</svg>
