name: Generate Snake Animation

on:
  schedule:
    # Regenerate twice a day
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake-gen
        with:
          github_user_name: ${{ github.repository_owner }}
          # Dark-green palette to match the profile theme
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=2ea043&color_dots=0d1117,0f5132,15803d,2ea043,3fb950
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=2ea043&color_dots=0d1117,0f5132,15803d,2ea043,3fb950

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
