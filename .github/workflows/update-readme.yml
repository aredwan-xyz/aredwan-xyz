name: Update Profile README

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    # Loops are prevented by the [skip ci] tag on the bot's own commits below

permissions:
  contents: write

concurrency:
  group: update-readme
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate dynamic sections
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional — add this repo secret to enable the WakaTime section
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: python .github/scripts/update_readme.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🛰️ Auto-update profile README [skip ci]"
            git push
          fi
